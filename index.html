<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gravity Ventures — Batch 1기 심사 대시보드</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Fraunces:ital,wght@0,300;0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0a1530;
  --bg2: #0f1d40;
  --bg3: #162750;
  --panel: #11204a;
  --panel-light: #1a2d5e;
  --navy: #0d1b38;
  --blue: #2563ff;
  --blue-light: #5b8fff;
  --blue-soft: rgba(37, 99, 255, 0.12);
  --silver: #c8d6ec;
  --silver-dim: #8a9bb8;
  --white: #f2f6ff;
  --gray: #5a6a84;
  --border: rgba(200, 214, 236, 0.1);
  --border-strong: rgba(200, 214, 236, 0.22);
  --success: #10b981;
  --warning: #f59e0b;
  --danger: #ef4444;
  --grade-a: #10b981;
  --grade-b: #3b82f6;
  --grade-c: #f59e0b;
  --grade-d: #6b7280;
  --font-display: 'Bebas Neue', 'Pretendard', sans-serif;
  --font-serif: 'Fraunces', serif;
  --font-body: 'Pretendard', sans-serif;
}

html { scroll-behavior: smooth; }

body {
  font-family: var(--font-body);
  background: var(--bg);
  color: var(--white);
  min-height: 100vh;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
  position: relative;
}

/* Atmospheric background */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse 800px 600px at 15% 0%, rgba(37, 99, 255, 0.15), transparent 60%),
    radial-gradient(ellipse 600px 500px at 90% 20%, rgba(91, 143, 255, 0.08), transparent 60%),
    radial-gradient(ellipse 1000px 700px at 50% 100%, rgba(37, 99, 255, 0.06), transparent 60%);
  pointer-events: none;
  z-index: 0;
}

body::after {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(rgba(200, 214, 236, 0.015) 1px, transparent 1px),
    linear-gradient(90deg, rgba(200, 214, 236, 0.015) 1px, transparent 1px);
  background-size: 48px 48px;
  pointer-events: none;
  z-index: 0;
}

/* Scrollbar */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb {
  background: linear-gradient(to bottom, var(--blue), var(--blue-light));
  border-radius: 3px;
}

/* ====================================================================== */
/* NAV                                                                    */
/* ====================================================================== */
nav {
  position: sticky;
  top: 0;
  z-index: 100;
  background: rgba(10, 21, 48, 0.92);
  backdrop-filter: blur(24px) saturate(180%);
  -webkit-backdrop-filter: blur(24px) saturate(180%);
  border-bottom: 1px solid var(--border);
  padding: 16px 32px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 24px;
}

.nav-brand {
  display: flex;
  align-items: center;
  gap: 14px;
  cursor: pointer;
  text-decoration: none;
  color: var(--white);
}
.nav-brand-mark {
  width: 36px; height: 36px;
  border-radius: 8px;
  background: linear-gradient(135deg, var(--blue) 0%, #7aa5ff 100%);
  display: grid; place-items: center;
  font-family: var(--font-display);
  font-size: 20px;
  color: var(--white);
  box-shadow: 0 4px 16px rgba(37, 99, 255, 0.4);
}
.nav-brand-text {
  font-family: var(--font-display);
  font-size: 22px;
  letter-spacing: 0.05em;
  line-height: 1;
}
.nav-brand-sub {
  font-size: 10px;
  color: var(--silver-dim);
  letter-spacing: 0.15em;
  text-transform: uppercase;
  margin-top: 3px;
}

.nav-actions {
  display: flex;
  align-items: center;
  gap: 12px;
}

.reviewer-pill {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 14px 8px 10px;
  background: var(--panel);
  border: 1px solid var(--border-strong);
  border-radius: 100px;
  font-size: 13px;
  cursor: pointer;
  transition: all 0.2s;
  color: var(--white);
}
.reviewer-pill:hover {
  background: var(--panel-light);
  border-color: var(--blue);
}
.reviewer-pill-avatar {
  width: 26px; height: 26px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--blue) 0%, var(--blue-light) 100%);
  display: grid; place-items: center;
  font-weight: 700;
  font-size: 11px;
}
.reviewer-pill i { color: var(--silver-dim); font-size: 10px; margin-left: 4px; }

.btn-export {
  padding: 9px 18px;
  border-radius: 8px;
  background: transparent;
  border: 1px solid var(--border-strong);
  color: var(--white);
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  gap: 8px;
}
.btn-export:hover {
  background: var(--blue-soft);
  border-color: var(--blue);
  color: var(--blue-light);
}

/* ====================================================================== */
/* MAIN CONTAINER                                                         */
/* ====================================================================== */
main {
  max-width: 1680px;
  margin: 0 auto;
  padding: 40px 32px 80px;
  position: relative;
  z-index: 1;
}

.page-header {
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
  margin-bottom: 40px;
  gap: 32px;
  flex-wrap: wrap;
}

.page-title-block h1 {
  font-family: var(--font-display);
  font-size: clamp(44px, 6vw, 72px);
  line-height: 0.95;
  letter-spacing: 0.02em;
  font-weight: 400;
}
.page-title-block h1 .accent {
  color: var(--blue-light);
  font-style: italic;
  font-family: var(--font-serif);
  font-weight: 400;
  font-size: 0.55em;
  margin-left: 8px;
  letter-spacing: 0;
}
.page-title-block p {
  margin-top: 12px;
  color: var(--silver-dim);
  font-size: 14px;
  letter-spacing: 0.02em;
}

/* ====================================================================== */
/* STATS BAR                                                              */
/* ====================================================================== */
.stats-bar {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
  gap: 16px;
  margin-bottom: 40px;
}

.stat-card {
  background: linear-gradient(135deg, var(--panel) 0%, var(--bg2) 100%);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 22px 24px;
  position: relative;
  overflow: hidden;
  transition: border-color 0.3s;
}
.stat-card:hover { border-color: var(--border-strong); }
.stat-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0;
  width: 3px; height: 100%;
  background: linear-gradient(to bottom, var(--blue), var(--blue-light));
  opacity: 0.5;
}
.stat-label {
  font-size: 11px;
  color: var(--silver-dim);
  text-transform: uppercase;
  letter-spacing: 0.12em;
  margin-bottom: 10px;
}
.stat-value {
  font-family: var(--font-display);
  font-size: 38px;
  line-height: 1;
  color: var(--white);
}
.stat-value .unit {
  font-size: 14px;
  color: var(--silver-dim);
  margin-left: 4px;
  font-family: var(--font-body);
}
.stat-sub {
  font-size: 11px;
  color: var(--silver-dim);
  margin-top: 6px;
}

/* ====================================================================== */
/* TOOLBAR                                                                */
/* ====================================================================== */
.toolbar {
  display: flex;
  gap: 12px;
  align-items: center;
  margin-bottom: 24px;
  flex-wrap: wrap;
}

.search-box {
  flex: 1;
  min-width: 240px;
  position: relative;
}
.search-box input {
  width: 100%;
  padding: 12px 16px 12px 44px;
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 10px;
  color: var(--white);
  font-size: 14px;
  font-family: var(--font-body);
  transition: border-color 0.2s;
}
.search-box input:focus {
  outline: none;
  border-color: var(--blue);
}
.search-box i {
  position: absolute;
  left: 16px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--silver-dim);
}

.filter-group {
  display: flex;
  gap: 6px;
  padding: 4px;
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 10px;
}

.filter-chip {
  padding: 8px 14px;
  background: transparent;
  border: none;
  color: var(--silver-dim);
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  border-radius: 7px;
  transition: all 0.2s;
  font-family: var(--font-body);
  white-space: nowrap;
}
.filter-chip:hover { color: var(--white); }
.filter-chip.active {
  background: var(--blue);
  color: var(--white);
}

.sort-select {
  padding: 10px 14px;
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 10px;
  color: var(--white);
  font-size: 13px;
  cursor: pointer;
  font-family: var(--font-body);
}

/* ====================================================================== */
/* COMPANY GRID                                                           */
/* ====================================================================== */
.company-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
  gap: 18px;
}

.company-card {
  background: linear-gradient(135deg, var(--panel) 0%, var(--bg2) 100%);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 24px;
  cursor: pointer;
  transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  position: relative;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  gap: 16px;
  min-height: 210px;
}
.company-card::before {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(circle at top right, rgba(37, 99, 255, 0.06), transparent 60%);
  opacity: 0;
  transition: opacity 0.3s;
}
.company-card:hover {
  border-color: var(--blue);
  transform: translateY(-2px);
  box-shadow: 0 12px 32px rgba(0, 0, 0, 0.4), 0 0 0 1px var(--blue);
}
.company-card:hover::before { opacity: 1; }

.card-header {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 12px;
  position: relative;
}
.card-status {
  font-size: 10px;
  color: var(--silver-dim);
  letter-spacing: 0.12em;
  text-transform: uppercase;
  display: flex;
  align-items: center;
  gap: 6px;
}
.card-status-dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: var(--grade-d);
}
.card-status-dot.has-ir { background: var(--success); box-shadow: 0 0 8px rgba(16, 185, 129, 0.5); }
.card-status-dot.scored { background: var(--blue); box-shadow: 0 0 8px rgba(37, 99, 255, 0.5); }

.card-grade {
  font-family: var(--font-display);
  font-size: 26px;
  width: 44px; height: 44px;
  border-radius: 10px;
  display: grid; place-items: center;
  letter-spacing: 0;
}
.card-grade.none {
  background: rgba(200, 214, 236, 0.08);
  color: var(--silver-dim);
  font-size: 18px;
  font-family: var(--font-body);
  font-weight: 400;
}
.card-grade.grade-A { background: var(--grade-a); color: var(--white); }
.card-grade.grade-B { background: var(--grade-b); color: var(--white); }
.card-grade.grade-C { background: var(--grade-c); color: var(--white); }
.card-grade.grade-D { background: var(--grade-d); color: var(--white); }

.card-title {
  font-family: var(--font-serif);
  font-size: 22px;
  font-weight: 600;
  line-height: 1.2;
  letter-spacing: -0.01em;
  color: var(--white);
  position: relative;
}
.card-tagline {
  font-size: 13px;
  color: var(--silver-dim);
  line-height: 1.5;
  position: relative;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

.card-meta {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  margin-top: auto;
  position: relative;
}
.meta-tag {
  font-size: 11px;
  padding: 4px 10px;
  background: rgba(200, 214, 236, 0.07);
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--silver);
  white-space: nowrap;
}
.meta-tag.sector { background: var(--blue-soft); color: var(--blue-light); border-color: rgba(37, 99, 255, 0.25); }

.card-footer {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding-top: 16px;
  border-top: 1px solid var(--border);
  position: relative;
}
.card-score {
  font-family: var(--font-display);
  font-size: 24px;
  line-height: 1;
  color: var(--white);
}
.card-score .max { color: var(--silver-dim); font-size: 13px; margin-left: 2px; }
.card-score.empty { color: var(--silver-dim); font-size: 13px; font-family: var(--font-body); }

.card-cta {
  font-size: 11px;
  color: var(--silver-dim);
  letter-spacing: 0.08em;
  text-transform: uppercase;
  display: flex;
  align-items: center;
  gap: 6px;
  transition: color 0.2s;
}
.company-card:hover .card-cta { color: var(--blue-light); }

/* ====================================================================== */
/* DETAIL VIEW                                                            */
/* ====================================================================== */
.detail-view {
  display: none;
  animation: fadeInUp 0.4s ease;
}
.detail-view.active { display: block; }

@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}

.back-btn {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 10px 18px;
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--silver);
  cursor: pointer;
  font-size: 13px;
  margin-bottom: 24px;
  transition: all 0.2s;
  font-family: var(--font-body);
}
.back-btn:hover {
  background: var(--panel-light);
  color: var(--white);
  border-color: var(--border-strong);
}

.detail-hero {
  background: linear-gradient(135deg, var(--panel) 0%, var(--bg2) 100%);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 36px 40px;
  margin-bottom: 24px;
  position: relative;
  overflow: hidden;
}
.detail-hero::before {
  content: '';
  position: absolute;
  top: 0; right: 0;
  width: 400px; height: 400px;
  background: radial-gradient(circle, rgba(37, 99, 255, 0.12), transparent 70%);
  pointer-events: none;
}

.detail-hero-top {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 24px;
  margin-bottom: 20px;
  position: relative;
}
.detail-hero h2 {
  font-family: var(--font-serif);
  font-size: clamp(32px, 4vw, 44px);
  line-height: 1.1;
  font-weight: 600;
  letter-spacing: -0.01em;
  color: var(--white);
}
.detail-hero-tagline {
  font-size: 15px;
  color: var(--silver);
  line-height: 1.5;
  margin-top: 10px;
  max-width: 820px;
}
.detail-hero-meta {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  margin-top: 20px;
  position: relative;
}
.detail-hero-meta .meta-tag {
  padding: 6px 14px;
  font-size: 12px;
}

/* Detail split layout */
.detail-split {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 24px;
}
@media (max-width: 1200px) {
  .detail-split { grid-template-columns: 1fr; }
}

.detail-panel {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 14px;
  overflow: hidden;
}

.panel-header {
  padding: 20px 28px;
  background: linear-gradient(135deg, rgba(37, 99, 255, 0.1), transparent);
  border-bottom: 1px solid var(--border);
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.panel-title {
  font-family: var(--font-display);
  font-size: 18px;
  letter-spacing: 0.08em;
  color: var(--white);
}
.panel-title i { color: var(--blue-light); margin-right: 10px; }

.panel-body { padding: 28px; }

/* IR SUMMARY */
.ir-empty {
  text-align: center;
  padding: 80px 20px;
  color: var(--silver-dim);
}
.ir-empty i {
  font-size: 48px;
  color: rgba(200, 214, 236, 0.2);
  margin-bottom: 20px;
  display: block;
}
.ir-empty h4 {
  font-family: var(--font-serif);
  font-size: 20px;
  font-weight: 600;
  color: var(--white);
  margin-bottom: 10px;
}
.ir-empty p { font-size: 13px; line-height: 1.7; }

.ir-section { margin-bottom: 28px; }
.ir-section:last-child { margin-bottom: 0; }
.ir-section h3 {
  font-family: var(--font-serif);
  font-size: 18px;
  font-weight: 600;
  color: var(--white);
  margin-bottom: 14px;
  padding-bottom: 10px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 10px;
}
.ir-section h3 .section-num {
  font-family: var(--font-display);
  font-size: 14px;
  color: var(--blue-light);
  width: 24px; height: 24px;
  background: var(--blue-soft);
  border-radius: 5px;
  display: inline-grid;
  place-items: center;
}
.ir-section h4 {
  font-size: 13px;
  font-weight: 600;
  color: var(--blue-light);
  margin: 16px 0 8px;
  letter-spacing: 0.02em;
}
.ir-section h4:first-child { margin-top: 0; }

.ir-info-grid {
  display: grid;
  grid-template-columns: 120px 1fr;
  gap: 10px 16px;
  font-size: 13px;
  line-height: 1.6;
}
.ir-info-grid dt {
  color: var(--silver-dim);
  font-weight: 500;
}
.ir-info-grid dd {
  color: var(--white);
}

.ir-bullets {
  list-style: none;
  padding: 0;
}
.ir-bullets li {
  position: relative;
  padding-left: 18px;
  font-size: 13px;
  line-height: 1.65;
  color: var(--silver);
  margin-bottom: 8px;
}
.ir-bullets li::before {
  content: '';
  position: absolute;
  left: 0; top: 9px;
  width: 6px; height: 6px;
  background: var(--blue);
  border-radius: 50%;
}

.ir-callout {
  padding: 14px 18px;
  background: var(--blue-soft);
  border-left: 3px solid var(--blue);
  border-radius: 0 8px 8px 0;
  font-size: 13px;
  line-height: 1.6;
  color: var(--silver);
  margin: 12px 0;
}
.ir-callout strong { color: var(--blue-light); }

.ir-market-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
  margin: 12px 0;
}
.ir-market-card {
  background: rgba(200, 214, 236, 0.04);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 14px;
  text-align: center;
}
.ir-market-card .label {
  font-size: 10px;
  color: var(--silver-dim);
  letter-spacing: 0.1em;
  text-transform: uppercase;
  margin-bottom: 6px;
}
.ir-market-card .value {
  font-family: var(--font-display);
  font-size: 24px;
  color: var(--blue-light);
  margin-bottom: 4px;
}
.ir-market-card .desc {
  font-size: 11px;
  color: var(--silver-dim);
  line-height: 1.3;
}

.ir-table {
  width: 100%;
  border-collapse: collapse;
  margin: 12px 0;
  font-size: 12px;
}
.ir-table th, .ir-table td {
  padding: 10px 12px;
  text-align: left;
  border-bottom: 1px solid var(--border);
}
.ir-table th {
  background: rgba(200, 214, 236, 0.04);
  font-weight: 600;
  color: var(--silver);
  font-size: 11px;
  letter-spacing: 0.05em;
  text-transform: uppercase;
}
.ir-table td { color: var(--silver); }
.ir-table .highlight { color: var(--blue-light); font-weight: 600; }

.ir-team-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
  margin: 10px 0;
}
.ir-team-card {
  background: rgba(200, 214, 236, 0.04);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 14px;
}
.ir-team-card .name {
  font-family: var(--font-serif);
  font-size: 14px;
  font-weight: 600;
  color: var(--white);
  margin-bottom: 2px;
}
.ir-team-card .role {
  font-size: 10px;
  color: var(--blue-light);
  letter-spacing: 0.05em;
  text-transform: uppercase;
  margin-bottom: 10px;
}
.ir-team-card ul {
  list-style: none;
  padding: 0;
  font-size: 11px;
  line-height: 1.5;
  color: var(--silver);
}
.ir-team-card ul li {
  padding: 2px 0 2px 10px;
  position: relative;
}
.ir-team-card ul li::before {
  content: '·';
  position: absolute;

// ========================================================================
// 저장소 (window.storage API 사용, 없거나 실패 시 메모리 fallback)
// ========================================================================
const _memoryStore = {};

function hasStorage() {
  return typeof window !== "undefined" && window.storage && typeof window.storage.get === "function";
}

async function _storageGet(key) {
  if (!hasStorage()) {
    return _memoryStore[key] ? { value: _memoryStore[key] } : null;
  }
  try {
    return await window.storage.get(key);
  } catch {
    // 키가 없거나 에러 — 메모리 fallback 확인
    return _memoryStore[key] ? { value: _memoryStore[key] } : null;
  }
}

async function _storageSet(key, value) {
  _memoryStore[key] = value;  // 항상 메모리에도 저장 (즉시 사용 가능)
  if (!hasStorage()) return true;
  try {
    await window.storage.set(key, value);
    return true;
  } catch (e) {
    console.warn(`storage.set 실패 (메모리에만 저장됨): ${key}`, e);
    return false;
  }
}

async function _storageList(prefix) {
  const memKeys = Object.keys(_memoryStore).filter(k => k.startsWith(prefix));
  if (!hasStorage()) return memKeys;
  try {
    const result = await window.storage.list(prefix);
    const apiKeys = result ? (result.keys || []) : [];
    return [...new Set([...apiKeys, ...memKeys])];
  } catch {
    return memKeys;
  }
}

async function loadReviewer(reviewerName) {
  const result = await _storageGet(`reviewer:${reviewerName}`);
  if (!result) return {};
  try {
    return JSON.parse(result.value);
  } catch {
    return {};
  }
}

async function saveReviewer(reviewerName, data) {
  return await _storageSet(`reviewer:${reviewerName}`, JSON.stringify(data));
}

async function loadReviewerList() {
  const keys = await _storageList("reviewer:");
  return keys.map(k => k.replace("reviewer:", ""));
}

async function init() {
  // ⚠️ 중요: 이벤트 바인딩은 제일 먼저 — storage 에러가 나더라도 버튼은 동작해야 함
  bindEvents();
  renderStats();
  renderCompanyGrid();

  // 기존 심사위원 목록 불러오기 (실패해도 앱은 동작)
  try {
    allReviewers = await loadReviewerList();
  } catch (e) {
    console.warn("심사위원 목록 로드 실패:", e);
    allReviewers = [];
  }

  // 저장된 현재 심사위원이 있으면 복원, 없으면 모달 열기
  let savedReviewer = null;
  const saved = await _storageGet("current_reviewer");
  if (saved && saved.value) savedReviewer = saved.value;

  if (savedReviewer) {
    currentReviewer = savedReviewer;
    await loadCurrentReviewerData();
    updateReviewerPill();
    renderStats();
    renderCompanyGrid();
  } else {
    await openReviewerModal(false);
  }
}

async function loadCurrentReviewerData() {
  if (!currentReviewer) return;
  reviewData = await loadReviewer(currentReviewer);
}

// UI — 심사위원 모달
// ========================================================================
async function openReviewerModal(allowCancel) {
  const modal = document.getElementById("reviewerModal");
  const cancel = document.getElementById("modalCancel");
  const list = document.getElementById("reviewerList");
  const listBody = document.getElementById("reviewerListBody");

  cancel.style.display = allowCancel ? "block" : "none";
  document.getElementById("reviewerNameInput").value = currentReviewer || "";

  // ⚠️ 먼저 모달 열기 — storage 실패해도 UI는 동작해야 함
  modal.classList.add("active");
  setTimeout(() => document.getElementById("reviewerNameInput").focus(), 100);

  // 기존 심사위원 목록 로드 (실패 시 빈 상태로 처리)
  try {
    allReviewers = await loadReviewerList();
  } catch {
    allReviewers = [];
  }

  if (allReviewers && allReviewers.length > 0) {
    list.style.display = "block";
    listBody.innerHTML = "";
    for (const name of allReviewers) {
      let scoredCount = 0;
      try {
        const data = await loadReviewer(name);
        scoredCount = data ? Object.keys(data).length : 0;
      } catch {
        scoredCount = 0;
      }
      const item = document.createElement("div");
      item.className = "reviewer-list-item";
      item.innerHTML = `<span><i class="fa-solid fa-user" style="color:var(--blue-light);margin-right:8px"></i>${escapeHtml(name)}</span><span class="count">${scoredCount}개사 평가</span>`;
      item.onclick = () => selectReviewer(name);
      listBody.appendChild(item);
    }
  } else {
    list.style.display = "none";
  }
}

async function selectReviewer(name) {
  // ⚠️ UI 전환을 먼저 수행 — storage 실패해도 페이지는 넘어가야 함
  currentReviewer = name;
  updateReviewerPill();
  closeReviewerModal();

  // storage 작업 (실패해도 앱 동작에는 영향 없음, 메모리 fallback 존재)
  await _storageSet("current_reviewer", name);

  try {
    await loadCurrentReviewerData();
  } catch (e) {
    console.warn("심사위원 데이터 로드 실패:", e);
    reviewData = {};
  }

  renderStats();
  renderCompanyGrid();
  if (currentCompany) showDetail(currentCompany);
}

function closeReviewerModal() {
  document.getElementById("reviewerModal").classList.remove("active");
}

function updateReviewerPill() {
  document.getElementById("reviewerName").textContent = currentReviewer || "심사위원 선택";
  document.getElementById("reviewerAvatar").textContent = currentReviewer ? currentReviewer.charAt(0).toUpperCase() : "?";

function calcTotal(companyNo) {
  const data = reviewData[companyNo];
  if (!data || !data.scores) return null;
  const allKeys = CRITERIA.flatMap(g => g.items.map(i => i.id));
  const filled = allKeys.filter(k => data.scores[k] != null);
  if (filled.length === 0) return null;
  let total = 0;
  for (const g of CRITERIA) {
    for (const it of g.items) {
      const s = data.scores[it.id];
      if (s != null) total += s * it.pts / 5;
    }
  }
  return Math.round(total * 10) / 10;
}

function calcGroupTotal(companyNo, group) {
  const data = reviewData[companyNo];
  if (!data || !data.scores) return null;
  let total = 0;
  let has = false;
  for (const it of group.items) {
    const s = data.scores[it.id];
    if (s != null) { total += s * it.pts / 5; has = true; }
  }
  return has ? Math.round(total * 10) / 10 : null;
}

function getGrade(total) {
  if (total == null) return null;
  if (total >= 85) return "A";
  if (total >= 70) return "B";
  if (total >= 55) return "C";
  return "D";
}

function renderStats() {
  const totalCompanies = COMPANIES.length;
  let evaluated = 0, gradeA = 0, gradeB = 0, gradeC = 0, gradeD = 0;
  for (const c of COMPANIES) {
    const total = calcTotal(c.no);
    if (total != null) {
      evaluated++;
      const g = getGrade(total);
      if (g === "A") gradeA++;
      if (g === "B") gradeB++;
      if (g === "C") gradeC++;
      if (g === "D") gradeD++;
    }
  }

  const bar = document.getElementById("statsBar");
  bar.innerHTML = `
    <div class="stat-card">
      <div class="stat-label">지원 기업</div>
      <div class="stat-value">${totalCompanies}<span class="unit">개사</span></div>
      <div class="stat-sub">Batch 1기 서면 심사 대상</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">평가 진행</div>
      <div class="stat-value">${evaluated}<span class="unit">/ ${totalCompanies}</span></div>
      <div class="stat-sub">${currentReviewer ? `${currentReviewer} 심사자` : "심사위원 미선택"}</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">A 등급</div>
      <div class="stat-value" style="color:var(--grade-a)">${gradeA}</div>
      <div class="stat-sub">85점 이상 · 우선 선발</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">B 등급</div>
      <div class="stat-value" style="color:var(--grade-b)">${gradeB}</div>
      <div class="stat-sub">70~84점 · 후보</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">C / D</div>
      <div class="stat-value"><span style="color:var(--grade-c)">${gradeC}</span> <span style="color:var(--silver-dim);font-size:24px">/</span> <span style="color:var(--grade-d)">${gradeD}</span></div>
      <div class="stat-sub">재검토 / 부적격</div>
    </div>
  `;
}

// ========================================================================
// UI — 기업 그리드
// ========================================================================
function matchesFilter(c) {
  if (currentFilter === "all") return true;
  if (currentFilter === "Physical AI") return c.sector.includes("Physical AI");
  if (currentFilter === "반도체") return c.sector.includes("반도체");
  if (currentFilter === "의료") return c.sector.includes("의료") || c.sector.includes("헬스");
  if (currentFilter === "딥테크") return c.sector.includes("딥테크") || c.sector.includes("SaaS");
  return true;
}

function matchesSearch(c) {
  if (!currentSearch) return true;
  const q = currentSearch.toLowerCase();
  return c.name.toLowerCase().includes(q)
      || c.brand.toLowerCase().includes(q)
      || c.sector.toLowerCase().includes(q)
      || c.location.toLowerCase().includes(q)
      || (c.tagline || "").toLowerCase().includes(q);
}

function getFilteredCompanies() {
  let list = COMPANIES.filter(c => matchesFilter(c) && matchesSearch(c));
  if (currentSort === "score-desc") {
    list = [...list].sort((a,b) => (calcTotal(b.no) ?? -1) - (calcTotal(a.no) ?? -1));
  } else if (currentSort === "score-asc") {
    list = [...list].sort((a,b) => {
      const ta = calcTotal(a.no), tb = calcTotal(b.no);
      if (ta == null && tb == null) return 0;
      if (ta == null) return 1;
      if (tb == null) return -1;
      return ta - tb;
    });
  } else if (currentSort === "name") {
    list = [...list].sort((a,b) => a.name.localeCompare(b.name, "ko"));
  }
  return list;
}

function renderCompanyGrid() {
  const grid = document.getElementById("companyGrid");
  const list = getFilteredCompanies();
  if (list.length === 0) {
    grid.innerHTML = `<div style="grid-column:1/-1;text-align:center;padding:60px;color:var(--silver-dim)">검색 결과가 없습니다</div>`;
    return;
  }

  grid.innerHTML = list.map(c => {
    const total = calcTotal(c.no);
    const grade = getGrade(total);
    const hasIR = c.hasIR;
    const scored = total != null;

    let statusText, statusClass;
    if (scored) { statusText = "평가 완료"; statusClass = "scored"; }
    else if (hasIR) { statusText = "IR 요약 준비됨"; statusClass = "has-ir"; }
    else { statusText = "IR 요약 준비 중"; statusClass = ""; }

    return `
      <div class="company-card" onclick="showDetail(${c.no})">
        <div class="card-header">
          <div>
            <div class="card-status">
              <div class="card-status-dot ${statusClass}"></div>
              <span>${statusText}</span>
            </div>
          </div>
          <div class="card-grade ${grade ? 'grade-' + grade : 'none'}">${grade || '—'}</div>
        </div>
        <div>
          <div class="card-title">${escapeHtml(c.brand || c.name)}</div>
        </div>
        <div class="card-tagline">${escapeHtml(c.tagline || '')}</div>
        <div class="card-meta">
          <span class="meta-tag sector">${escapeHtml(c.sector.split(',')[0].split('/')[0].trim())}</span>
          <span class="meta-tag">${escapeHtml(c.location)}</span>
          <span class="meta-tag">${escapeHtml(c.age)}</span>
        </div>
        <div class="card-footer">
          <div class="${scored ? 'card-score' : 'card-score empty'}">
            ${scored ? `${total}<span class="max">/100</span>` : '미평가'}
          </div>
          <div class="card-cta">
            <span>평가하기</span>
            <i class="fa-solid fa-arrow-right"></i>
          </div>
        </div>
      </div>
    `;
  }).join("");
}

function bindScoreEvents(companyNo) {
  document.querySelectorAll(".score-btn").forEach(btn => {
    btn.onclick = async () => {
      const itemId = btn.dataset.item;
      const score = parseInt(btn.dataset.score);

      if (!reviewData[companyNo]) reviewData[companyNo] = { scores: {}, opinions: {} };
      reviewData[companyNo].scores[itemId] = score;

      // UI 업데이트
      document.querySelectorAll(`.score-btn[data-item="${itemId}"]`).forEach(b => b.classList.remove("selected"));
      btn.classList.add("selected");

      updateScoreSummary(companyNo);
      await persistData();
    };
  });

  document.querySelectorAll("textarea[data-field]").forEach(ta => {
    let timer;
    ta.oninput = () => {
      clearTimeout(timer);
      timer = setTimeout(async () => {
        if (!reviewData[companyNo]) reviewData[companyNo] = { scores: {}, opinions: {} };
        if (!reviewData[companyNo].opinions) reviewData[companyNo].opinions = {};
        reviewData[companyNo].opinions[ta.dataset.field] = ta.value;
        await persistData();
      }, 600);
    };
  });
}

function updateScoreSummary(companyNo) {
  const total = calcTotal(companyNo);
  const totalDisplay = total != null ? total : 0;
  document.getElementById("scoreTotalValue").textContent = totalDisplay;
  document.getElementById("scoreBar").style.width = `${Math.min(totalDisplay, 100)}%`;

  const grade = getGrade(total);
  const letter = document.getElementById("scoreGradeLetter");
  const desc = document.getElementById("scoreGradeDesc");
  letter.className = "score-grade-letter " + (grade || "none");
  letter.textContent = grade || "—";
  desc.textContent = grade === "A" ? "우선 선발" : grade === "B" ? "후보 선발" : grade === "C" ? "재검토" : grade === "D" ? "부적격" : "미평가";

  // 그룹별 합계
  for (const group of CRITERIA) {
    const gs = calcGroupTotal(companyNo, group);
    const el = document.getElementById(`groupScore-${group.groupShort}`);
    if (el) el.textContent = gs != null ? gs : 0;
  }
}

async function persistData() {
  if (!currentReviewer) return;
  const ok = await saveReviewer(currentReviewer, reviewData);
  if (ok) showSaveIndicator();
}

function showSaveIndicator() {
  const el = document.getElementById("saveIndicator");
  el.classList.add("show");
  clearTimeout(window._saveT);
  window._saveT = setTimeout(() => el.classList.remove("show"), 1800);
}

function showList() {
  currentCompany = null;
  document.getElementById("listView").style.display = "block";
  document.getElementById("detailView").classList.remove("active");
  renderStats();
  renderCompanyGrid();
}

// ========================================================================
// UI — 엑셀 내보내기 (CSV)
// ========================================================================
function exportMyScores() {
  if (!currentReviewer) {
    alert("먼저 심사위원을 선택해주세요.");
    return;
  }

  const allItems = CRITERIA.flatMap(g => g.items);
  const headers = ["번호", "회사명", "분야", "업력", "대표자"];
  allItems.forEach(it => headers.push(`${it.id}. ${it.name}(${it.pts}점)`));
  headers.push("총점(100)", "등급", "심사 의견");

  const rows = [headers];
  for (const c of COMPANIES) {
    const d = reviewData[c.no] || {};
    const scores = d.scores || {};
    const ops = d.opinions || {};
    const total = calcTotal(c.no);
    const row = [c.no, c.name, c.sector, c.age, c.ceo];
    allItems.forEach(it => row.push(scores[it.id] ?? ""));
    row.push(total ?? "", getGrade(total) ?? "", ops.comment || ops.strength || "");
    rows.push(row);
  }

  // CSV 생성 (UTF-8 BOM 추가로 한글 엑셀 호환)
  const csv = "\uFEFF" + rows.map(r =>
    r.map(v => {
      const s = String(v).replace(/"/g, '""');
      return /[",\n]/.test(s) ? `"${s}"` : s;
    }).join(",")
  ).join("\n");

  const blob = new Blob([csv], { type: "text/csv;charset=utf-8;" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = `Gravity_심사점수_${currentReviewer}_${new Date().toISOString().slice(0,10)}.csv`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

// ========================================================================
// Utilities
// ========================================================================
function escapeHtml(s) {
  if (s == null) return "";
  return String(s)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#39;");
}

function bindEvents() {
  document.getElementById("searchInput").oninput = (e) => {
    currentSearch = e.target.value;
    renderCompanyGrid();
  };
  document.getElementById("sortSelect").onchange = (e) => {
    currentSort = e.target.value;
    renderCompanyGrid();
  };
  document.querySelectorAll(".filter-chip").forEach(chip => {
    chip.onclick = () => {
      document.querySelectorAll(".filter-chip").forEach(c => c.classList.remove("active"));
      chip.classList.add("active");
      currentFilter = chip.dataset.filter;
      renderCompanyGrid();
    };
  });
  document.getElementById("modalConfirm").onclick = async () => {
    const name = document.getElementById("reviewerNameInput").value.trim();
    if (!name) { alert("이름을 입력해주세요."); return; }
    try {
      await selectReviewer(name);
    } catch (e) {
      console.error("selectReviewer 에러:", e);
      alert("오류가 발생했습니다: " + e.message);
    }
  };
  document.getElementById("modalCancel").onclick = closeReviewerModal;
  document.getElementById("reviewerNameInput").onkeydown = (e) => {
    if (e.key === "Enter") document.getElementById("modalConfirm").click();
  };
}

init();
